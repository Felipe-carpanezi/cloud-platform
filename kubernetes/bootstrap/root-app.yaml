apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Felipe-carpanezi/cloud-platform.git
    targetRevision: main  # <--- Mudamos de HEAD para main
    path: kubernetes/platform
    directory:            # <--- Adicionamos este bloco
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true