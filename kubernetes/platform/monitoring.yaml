apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher-monitoring
  namespace: argocd
spec:
  project: default
  source:
    chart: rancher-monitoring
    repoURL: https://charts.rancher.io
    targetRevision: 103.1.1+up45.31.1
    helm:
      values: |
        grafana:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.52.202.46.203.sslip.io
        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - prometheus.52.202.46.203.sslip.io
          prometheusSpec:
            scrapeInterval: "30s"
            evaluationInterval: "30s"
  destination:
    server: https://kubernetes.default.svc
    namespace: cattle-monitoring-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true