apiVersion: v1
kind: ConfigMap
metadata:
  name: html-content
  namespace: my-app
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>Cloud Platform</title></head>
    <body>
      <h1>🚀 Plataforma funcionando!</h1>
      <p>Deploy via GitOps + Kubernetes + AWS</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        config_map:
          name: html-content
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: my-app
spec:
  selector:
    app: web
  ports:
  - port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  namespace: my-app
spec:
  ingressClassName: nginx
  rules:
  - host: meu-site.52.202.46.203.sslip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 80