apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-html
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Felipe-carpanezi/cloud-platform.git
    targetRevision: main
    path: kubernetes/apps/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true