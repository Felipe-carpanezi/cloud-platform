apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    # AQUI ESTÁ A CORREÇÃO:
    repoURL: git@github.com:Felipe-carpanezi/cloud-platform.git 
    targetRevision: HEAD
    path: kubernetes/platform # O Argo vai "vigiar" esta pasta
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true