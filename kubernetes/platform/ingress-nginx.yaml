apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    chart: ingress-nginx
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.10.0
    helm:
      values: |
        controller:
          service:
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: nlb
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true # O Argo criará o namespace ingress-nginx sozinho
    syncOptions:             
      - CreateNamespace=true
      - ServerSideApply=true  # <--- ISSO RESOLVE 90% DOS ERROS DE SYNC
